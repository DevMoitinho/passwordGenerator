<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="main.css">
    <script src="main.js" defer></script>
  </head>
  <body>
    <div class="window">
      <h1 id="title">Password Generator</h1>

      <div class="panel">
        <div class="input">
          <label for="length">Length</label>
          <input type="number" id="length">
        </div>
        <div class="input">
          <label for="upper">Uppers</label>
          <input type="checkbox" id="upper" class="check">
        </div>
        <div class="input">
          <label for="nums">Digits</label>
          <input type="checkbox" id="nums" class="check">
        </div>
        <div class="input">
          <label for="symb">Symbols</label>
          <input type="checkbox" id="symb" class="check">
        </div>
        <button class="generate" id="generate">Generate</button>
      </div>

      <div class="panel">
        <h2>Password:</h2>
        <div class="result">
          <h3 id="senha">
        </div>   
      </div>
      
    </div>
    
  </body>
</html>
